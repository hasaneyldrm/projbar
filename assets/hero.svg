<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b26"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5f56"/>
      <stop offset="0.5" stop-color="#ffbd2e"/>
      <stop offset="1" stop-color="#27c93f"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="319" rx="16" fill="none" stroke="#2d333f"/>

  <!-- ince aksan çizgisi -->
  <rect x="60" y="196" width="120" height="4" rx="2" fill="url(#glow)"/>

  <!-- başlık -->
  <text x="60" y="150" font-family="-apple-system, 'SF Pro Display', Segoe UI, sans-serif"
        font-size="84" font-weight="800" fill="#f0f6fc" letter-spacing="-2">ProjBar</text>
  <text x="60" y="246" font-family="-apple-system, Segoe UI, sans-serif"
        font-size="26" fill="#8b949e">Project-aware Terminal tabs for macOS</text>
  <text x="60" y="284" font-family="-apple-system, Segoe UI, sans-serif"
        font-size="17" fill="#586069">zero polling · ~16 MB · built for multi-agent workflows</text>

  <!-- sağda proje hapları -->
  <g font-family="'SF Mono', ui-monospace, Menlo, monospace" font-size="20" font-weight="600">
    <rect x="760" y="70" width="380" height="52" rx="26" fill="#1c2128" stroke="#30363d"/>
    <circle cx="792" cy="96" r="8" fill="#f85149"/>
    <text x="812" y="103" fill="#e6edf3">my-app <tspan fill="#768390" font-weight="400">— payment flow fix</tspan></text>

    <rect x="800" y="136" width="340" height="52" rx="26" fill="#1c2128" stroke="#30363d"/>
    <circle cx="832" cy="162" r="8" fill="#539bf5"/>
    <text x="852" y="169" fill="#e6edf3">my-api <tspan fill="#768390" font-weight="400">— rate limiter</tspan></text>

    <rect x="840" y="202" width="300" height="52" rx="26" fill="#1c2128" stroke="#30363d"/>
    <circle cx="872" cy="228" r="8" fill="#57ab5a"/>
    <text x="892" y="235" fill="#e6edf3">my-website <tspan fill="#768390" font-weight="400">— v2</tspan></text>
  </g>

  <!-- ⌥Tab ipucu -->
  <g font-family="-apple-system, Segoe UI, sans-serif" font-size="15">
    <rect x="760" y="272" width="66" height="30" rx="7" fill="#21262d" stroke="#30363d"/>
    <text x="793" y="292" fill="#adbac7" text-anchor="middle">⌥ Tab</text>
    <text x="838" y="292" fill="#586069">cycle between open work</text>
  </g>
</svg>
